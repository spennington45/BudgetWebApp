<div class="chart-container">
  <div class="chart-wrapper">
    <canvas baseChart [data]="pieChartData" [options]="pieChartOptions" [type]="'pie'"></canvas>
  </div>
  <div class="chart-wrapper">
    <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="'bar'"></canvas>
  </div>
</div>

<h3>
  <p>This Month's Total: {{ currentBudgetTotal() | currency }}</p>
  Budget Line Items
</h3>

<div class="action-buttons">
  <button mat-raised-button color="primary" (click)="addNewLineItem(); $event.stopPropagation()">
    Add New Line Item
  </button>

  <button mat-raised-button color="accent" class="ml-10" (click)="addRecurringExpenses(); $event.stopPropagation()">
    Add Recurring Expenses
  </button>
</div>

<table mat-table [dataSource]="budgetLineItems">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Name </th>
    <td mat-cell *matCellDef="let lineItem">
      <ng-container *ngIf="editingLineItemId === lineItem.budgetLineItemId; else labelView">
        <input [(ngModel)]="lineItem.name" (click)="$event.stopPropagation()" />
      </ng-container>
      <ng-template #labelView>
        {{ lineItem.name }}
      </ng-template>
    </td>
  </ng-container>

  <ng-container matColumnDef="value">
    <th mat-header-cell *matHeaderCellDef> Value </th>
    <td mat-cell *matCellDef="let lineItem">
      <ng-container *ngIf="editingLineItemId === lineItem.budgetLineItemId; else valueView">
        <input [(ngModel)]="lineItem.value" type="number" (click)="$event.stopPropagation()" />
      </ng-container>
      <ng-template #valueView>
        {{ lineItem.value }}
      </ng-template>
    </td>
  </ng-container>

  <ng-container matColumnDef="category">
    <th mat-header-cell *matHeaderCellDef> Category </th>
    <td mat-cell *matCellDef="let lineItem">
      <ng-container *ngIf="editingLineItemId === lineItem.budgetLineItemId; else categoryView">
        <div class="edit-field, select-row">
          <mat-select [(ngModel)]="lineItem.category" [compareWith]="compareCategories"
            (click)="$event.stopPropagation()">
            <mat-option disabled class="search-option">
              <mat-form-field appearance="outline" class="search-field">
                <mat-label>Search</mat-label>
                <input matInput [(ngModel)]="categoryFilter" (click)="$event.stopPropagation()" />
              </mat-form-field>
            </mat-option>
            <mat-option *ngFor="let cat of filteredCategories" [value]="cat">
              {{ cat.categoryName }}
            </mat-option>
          </mat-select>
          <button title="Add Category" mat-icon-button color="primary" class="inline-add-btn"
            (click)="openAddCategoryDialog(lineItem); $event.stopPropagation()">
            <mat-icon>add</mat-icon>
          </button>
        </div>
      </ng-container>
      <ng-template #categoryView>
        {{ lineItem.category?.categoryName }}
      </ng-template>
    </td>
  </ng-container>

  <ng-container matColumnDef="sourceType">
    <th mat-header-cell *matHeaderCellDef> Source </th>
    <td mat-cell *matCellDef="let lineItem">
      <ng-container *ngIf="editingLineItemId === lineItem.budgetLineItemId; else sourceView">
        <div class="edit-field, select-row">
          <mat-select [(ngModel)]="lineItem.sourceType" [compareWith]="compareSourceTypes"
            (click)="$event.stopPropagation()">
            <mat-option disabled class="search-option">
              <mat-form-field appearance="outline" class="search-field">
                <mat-label>Search</mat-label>
                <input matInput [(ngModel)]="sourceTypeFilter" (click)="$event.stopPropagation()" />
              </mat-form-field>
            </mat-option>
            <mat-option *ngFor="let source of filteredSourceTypes" [value]="source">
              {{ source.sourceName }}
            </mat-option>
          </mat-select>
          <button title='Add Source Type' mat-icon-button color="primary" class="inline-add-btn"
            (click)="openAddSourceTypeDialog(lineItem); $event.stopPropagation()">
            <mat-icon>add</mat-icon>
          </button>
        </div>
      </ng-container>
      <ng-template #sourceView>
        {{ lineItem.sourceType?.sourceName }}
      </ng-template>
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let lineItem">
      <ng-container *ngIf="editingLineItemId === lineItem.budgetLineItemId; else actionButtons">
        <ng-container *ngIf="lineItem.budgetLineItemId > 0; else newItemActions">
          <button mat-icon-button color="primary" (click)="saveEdit(lineItem); $event.stopPropagation()"
            [disabled]="!isLineItemValid(lineItem)">
            <mat-icon>check</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="cancelEdit(); $event.stopPropagation()">
            <mat-icon>close</mat-icon>
          </button>
        </ng-container>

        <ng-template #newItemActions>
          <button mat-icon-button color="primary" (click)="saveNewLineItem(); $event.stopPropagation()"
            [disabled]="!isNewLineItemValid()">
            <mat-icon>check</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="cancelNewLineItem(); $event.stopPropagation()">
            <mat-icon>close</mat-icon>
          </button>
        </ng-template>
      </ng-container>

      <ng-template #actionButtons>
        <ng-container *ngIf="lineItem.budgetLineItemId > 0">
          <button mat-icon-button color="accent" (click)="startEdit(lineItem); $event.stopPropagation()">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteLineItem(lineItem); $event.stopPropagation()">
            <mat-icon>delete</mat-icon>
          </button>
        </ng-container>
      </ng-template>

    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.new-item-row]="row.budgetLineItemId <= 0"
    (click)="openTransaction(row)">
  </tr>
</table>
